version: "3.9"

services:
  drug-repurposing-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: drug-repurposing-ai:latest
    container_name: drug_repurposing_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - model_cache:/home/appuser/.DeepPurpose
      - tdc_cache:/home/appuser/.tdc
    restart: always

volumes:
  model_cache:
  tdc_cache: